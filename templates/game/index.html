{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscaminas</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}?v=4">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>Minesweeper</h1>
            
          </div>
        </div>

        <div class="controls">
          <div class="select">
            <label for="difficulty" class="difficulty-label">Dificultad</label>
            <select id="difficulty">
              <option value="inexperto">Inexperto (8×8 · 8)</option>
              <option value="normal">Normal (9×9 · 10)</option>
              <option value="complejo" selected>Complejo (16×16 · 40)</option>
              <option value="dificil">Difícil (16×30 · 99)</option>
              <option value="pesadilla">Pesadilla (18×30 · 120)</option>
            </select>
          </div>

          <button id="btnNew" class="btn">Nueva partida</button>
          <button id="btnHint" class="btn btn-soft">Pista IA</button>
          <button id="btnTheme" class="btn btn-soft" aria-label="Alternar tema">Tema</button>
        </div>
      </header>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Minas</span>
            <span id="mines" class="stat-value">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Banderas</span>
            <span id="flags" class="stat-value">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Tiempo</span>
            <span id="timer" class="stat-value">00:00</span>
          </div>
          <div class="stat">
            <span class="stat-label">Récord</span>
            <span id="best" class="stat-value">—</span>
          </div>
          <div class="hint">Click = revelar · Click derecho = bandera · H = pista</div>
          <div id="status" class="status-pill">Listo</div>
        </div>

        <div class="board-wrap">
          <div id="board" class="board" role="grid" aria-label="Tablero de buscaminas"></div>
        </div>
      </section>

      <footer class="footer">
        <span>
          © <span id="year"></span> Todos los derechos reservados • Built with Python & Django • UX/UI Interface • Deployed on Render ®
        </span>
      </footer>
    </main>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
      }
      const CSRF_TOKEN = getCookie('csrftoken');
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
    <script src="{% static 'js/app.js' %}"></script>
  </body>
</html>
